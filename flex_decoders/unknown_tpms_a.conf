# Unknown TPMS Protocol A — 315 MHz
# ~80 pulses, ~10ms, OOK Manchester, 52us/104us timing
# Seen in clusters G11 (30+ captures)
# Likely a common US-market TPMS sensor
#
# This is an exploratory decoder to extract raw bits.
# Once the bit pattern is understood, it should be replaced
# with a proper decoder specifying preamble, bit count, and fields.

decoder {
    name        = Unknown-TPMS-A,
    modulation  = OOK_MC_ZEROBIT,
    short       = 52,
    long        = 104,
    reset       = 300,
    bits       >= 32,
    bits       <= 80,
}
