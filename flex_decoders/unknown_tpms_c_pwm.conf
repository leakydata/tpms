# Unknown TPMS Protocol C (PWM variant) — 315 MHz
# Same signal as unknown_tpms_c but trying PWM decode

decoder {
    name        = Unknown-TPMS-C-PWM,
    modulation  = OOK_PWM,
    short       = 48,
    long        = 96,
    gap         = 150,
    reset       = 250,
    bits       >= 24,
    bits       <= 68,
}
