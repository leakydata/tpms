# Unknown TPMS Protocol C — 315 MHz
# ~60 pulses, ~8ms, OOK Manchester, 48us/96us timing
# Faster timing variant — possibly aftermarket TPMS

decoder {
    name        = Unknown-TPMS-C,
    modulation  = OOK_MC_ZEROBIT,
    short       = 48,
    long        = 96,
    reset       = 250,
    bits       >= 24,
    bits       <= 68,
}
