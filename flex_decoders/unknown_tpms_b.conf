# Unknown TPMS Protocol B — 315 MHz
# ~80 pulses, ~23ms, OOK Manchester, 124us/240us timing
# Slower timing variant — possibly a different TPMS manufacturer

decoder {
    name        = Unknown-TPMS-B,
    modulation  = OOK_MC_ZEROBIT,
    short       = 124,
    long        = 240,
    reset       = 600,
    bits       >= 32,
    bits       <= 80,
}
