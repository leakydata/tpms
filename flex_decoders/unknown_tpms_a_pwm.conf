# Unknown TPMS Protocol A (PWM variant) — 315 MHz
# Same signal as unknown_tpms_a but trying PWM decode
# If Manchester doesn't produce clean data, this might

decoder {
    name        = Unknown-TPMS-A-PWM,
    modulation  = OOK_PWM,
    short       = 52,
    long        = 104,
    gap         = 150,
    reset       = 300,
    bits       >= 32,
    bits       <= 80,
}
